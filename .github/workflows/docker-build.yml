on:
  push:
    branches: [ main ]  # запускается при пуше в main
  pull_request:
    branches: [ main ]  # при создании Pull Request
jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Ubuntu как runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # скачивает код
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2  # настройка Buildx
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # секрет с логином
          password: ${{ secrets.DOCKER_PASSWORD }}  # секрет с паролем
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./lab2/app          # где лежит Dockerfile
          file: ./lab2/app/Dockerfile   # путь к Dockerfile
          push: true                     # опубликовать на Docker Hub
          tags: elizavetatk/my-flask-app:latest  # тег образа
      - name: Deploy notification
        run: |                           # команды для выполнения
          echo "Docker image built and pushed successfully!"
          echo "Image: elizavetatk/my-flask-app:latest"
          echo "Ready for deployment!"

